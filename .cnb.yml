# 主分支推送 - 同步到 GitHub
main:
  push:
    - runner:
        tags: cnb:arch:amd64
        cpus: 1
      imports: https://cnb.cool/dmxapi/claude-code-my/-/blob/main/env.yml
      stages:
        - name: sync to github with rebase
          image: tencentcom/git-sync
          settings:
            target_url: https://github.com/YeSongYun/openclaw_config.git
            auth_type: https
            username: ${GIT_USERNAME}
            password: ${GIT_ACCESS_TOKEN}
            sync_mode: rebase

# Tag 推送 - 自动发布 Release
$:
  tag_push:
    - runner:
        tags: cnb:arch:amd64
        cpus: 2
      imports: https://cnb.cool/dmxapi/claude-code-my/-/blob/main/env.yml
      stages:
        # 0. 同步 Tag 到 GitHub
        - name: sync tag to github
          image: alpine/git
          script:
            - git remote add github https://${GIT_USERNAME}:${GIT_ACCESS_TOKEN}@github.com/YeSongYun/openclaw_config.git || true
            - git push github ${CNB_BRANCH} --force

        # 1. 构建全平台
        - name: build all platforms
          image: golang:1.23-alpine
          script:
            - apk add --no-cache git
            - go mod download
            - mkdir -p dist
            - GOOS=linux   GOARCH=amd64 CGO_ENABLED=0 go build -ldflags "-s -w -X main.Version=${CNB_BRANCH}" -o dist/openclaw-config-linux-amd64 .
            - GOOS=linux   GOARCH=arm64 CGO_ENABLED=0 go build -ldflags "-s -w -X main.Version=${CNB_BRANCH}" -o dist/openclaw-config-linux-arm64 .
            - GOOS=windows GOARCH=amd64 CGO_ENABLED=0 go build -ldflags "-s -w -X main.Version=${CNB_BRANCH}" -o dist/openclaw-config-windows-amd64.exe .
            - GOOS=darwin  GOARCH=amd64 CGO_ENABLED=0 go build -ldflags "-s -w -X main.Version=${CNB_BRANCH}" -o dist/openclaw-config-darwin-amd64 .
            - GOOS=darwin  GOARCH=arm64 CGO_ENABLED=0 go build -ldflags "-s -w -X main.Version=${CNB_BRANCH}" -o dist/openclaw-config-darwin-arm64 .
            - ls -lh dist/

        # 2. 生成更新日志
        - name: generate changelog
          image: cnbcool/default-build-env
          script:
            - curl -sSL https://github.com/orhun/git-cliff/releases/download/v2.7.0/git-cliff-2.7.0-x86_64-unknown-linux-gnu.tar.gz | tar xz
            - git fetch --tags origin
            - ./git-cliff-2.7.0/git-cliff --config cliff.toml --latest --strip header
          exports:
            stdout: RELEASE_NOTES

        # 3. 创建 Release
        - name: create release
          type: git:release
          options:
            title: OpenClaw Config ${CNB_BRANCH}
            description: |
              ## OpenClaw Config 配置工具 ${CNB_BRANCH}

              终端 TUI 一键配置工具，无需 GUI 环境，纯终端交互运行。

              ---

              ${RELEASE_NOTES}

              ---

              ### 📥 下载

              | 平台 | 架构 | 文件 |
              |------|------|------|
              | Linux | x64 | `openclaw-config-linux-amd64` |
              | Linux | ARM64 | `openclaw-config-linux-arm64` |
              | Windows | x64 | `openclaw-config-windows-amd64.exe` |
              | macOS | Intel | `openclaw-config-darwin-amd64` |
              | macOS | Apple Silicon | `openclaw-config-darwin-arm64` |

              ---

              ### 🛠️ 使用说明

              #### Linux / macOS
              ```bash
              chmod +x openclaw-config-*
              ./openclaw-config-linux-amd64
              ```

              #### Windows
              ```
              openclaw-config-windows-amd64.exe
              ```

              ---

              ### 🔗 相关链接

              - [项目主页](https://cnb.cool/dmxapi/openclaw_config)

        # 4. 上传附件到 Release
        - name: upload attachments
          image: cnbcool/attachments
          settings:
            attachments:
              - "./dist/openclaw-config-*"
            ttl: 0

        # 5. 清理旧版本，只保留最近3个
        - name: cleanup old releases
          image: docker.cnb.cool/cnb/plugins/cnbcool/release-clean:latest
          settings:
            filter: "RECENT_N=3"
            debug: false
