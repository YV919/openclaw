name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - { goos: linux,   goarch: amd64, suffix: linux-amd64 }
          - { goos: linux,   goarch: arm64, suffix: linux-arm64 }
          - { goos: windows, goarch: amd64, suffix: windows-amd64.exe }
          - { goos: darwin,  goarch: amd64, suffix: macos-amd64 }
          - { goos: darwin,  goarch: arm64, suffix: macos-arm64 }

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version: '1.23'

      - name: Build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: 0
        run: |
          mkdir -p dist
          go build \
            -ldflags "-s -w -X main.Version=${{ github.ref_name }}" \
            -o dist/openclaw-config-${{ matrix.suffix }} \
            .

      - uses: actions/upload-artifact@v4
        with:
          name: openclaw-config-${{ matrix.suffix }}
          path: dist/openclaw-config-${{ matrix.suffix }}

  release:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Generate changelog
        id: changelog
        run: |
          curl -sSL https://github.com/orhun/git-cliff/releases/download/v2.7.0/git-cliff-2.7.0-x86_64-unknown-linux-gnu.tar.gz | tar xz
          {
            echo "content<<EOF"
            ./git-cliff-2.7.0/git-cliff --config cliff.toml --latest --strip header
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - uses: softprops/action-gh-release@v2
        with:
          name: OpenClaw Config ${{ github.ref_name }}
          body: |
            ## OpenClaw Config 配置工具 ${{ github.ref_name }}

            终端 TUI 一键配置工具，无需 GUI 环境，纯终端交互运行。

            ---

            ${{ steps.changelog.outputs.content }}

            ---

            ### 下载

            | 平台 | 架构 | 文件 |
            |------|------|------|
            | Linux | x64 | `openclaw-config-linux-amd64` |
            | Linux | ARM64 | `openclaw-config-linux-arm64` |
            | Windows | x64 | `openclaw-config-windows-amd64.exe` |
            | macOS | Intel | `openclaw-config-macos-amd64` |
            | macOS | Apple Silicon | `openclaw-config-macos-arm64` |

            ### 使用说明

            #### Linux
            ```bash
            # x64
            chmod +x openclaw-config-linux-amd64
            ./openclaw-config-linux-amd64

            # ARM64
            chmod +x openclaw-config-linux-arm64
            ./openclaw-config-linux-arm64
            ```

            #### macOS
            ```bash
            # Intel
            chmod +x openclaw-config-macos-amd64
            ./openclaw-config-macos-amd64

            # Apple Silicon
            chmod +x openclaw-config-macos-arm64
            ./openclaw-config-macos-arm64
            ```

            #### Windows
            ```
            openclaw-config-windows-amd64.exe
            ```
          files: artifacts/*
          draft: false
          prerelease: false
